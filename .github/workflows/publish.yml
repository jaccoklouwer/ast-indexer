name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release-metadata.outputs.tag }}
      version: ${{ steps.release-metadata.outputs.version }}

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Resolve release metadata
        id: release-metadata
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == 'workflow_dispatch' ]]; then
            TAG='${{ github.event.inputs.tag }}'
          else
            TAG='${{ github.ref_name }}'
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Expected a semver tag starting with v, got: $TAG" >&2
            exit 1
          fi

          VERSION=$(node -p "require('./package.json').version")
          if [[ "v$VERSION" != "$TAG" ]]; then
            echo "Tag $TAG does not match package.json version $VERSION" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag commit is reachable from main
        shell: bash
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Re-run publish checks
        run: pnpm run publish:check

  publish:
    name: Publish package
    needs: validate-release
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@klouwer94/ast-indexer
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-release.outputs.tag }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Publish to npm
        shell: bash
        run: npm publish --provenance --access public

      - name: Extract release notes from changelog
        shell: bash
        run: |
          VERSION='${{ needs.validate-release.outputs.version }}'

          awk -v version="$VERSION" '
            $0 ~ "^### \\[?[0-9]" {
              if (capture) exit
              if ($0 ~ "^### \\\\[" version "\\\\]" || $0 ~ "^### " version "([[:space:]]|$)") capture=1
            }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [[ ! -s RELEASE_NOTES.md ]]; then
            {
              echo '${{ needs.validate-release.outputs.tag }}'
              echo
              echo 'See CHANGELOG.md for release details.'
            } > RELEASE_NOTES.md
          fi

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file RELEASE_NOTES.md
          else
            gh release create "$RELEASE_TAG" --verify-tag --title "$RELEASE_TAG" --notes-file RELEASE_NOTES.md
          fi
